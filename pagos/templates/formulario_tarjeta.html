<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago con Tarjeta | Sportify</title>
    
    <style>
        /* ✅ CORRECCIÓN 1: Reset total para pantalla completa sin bordes blancos */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto; /* Permite scroll vertical si el contenido desborda */
            background-color: #121212; /* Fondo negro profundo global */
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* ✅ CORRECCIÓN 2: El contenedor ahora OCUPA TODA LA PANTALLA */
        .tarjeta-container {
            display: flex;
            justify-content: center; /* Centrado horizontal */
            align-items: center;     /* Centrado vertical */
            width: 100%;            
            min-height: 100vh;       /* Mínimo el alto de la pantalla, pero libre de crecer */
            background-color: #121212;
            padding: 20px;           /* Colchón de seguridad para que el formulario no toque los bordes en celulares */
            box-sizing: border-box;
        }
        /* Estilo del formulario bento oscuro */
        .tarjeta-card {
            background: #1e1e1e; /* Negro bento ligeramente más claro */
            padding: 40px;       /* Un poco más de aire interno */
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 255, 100, 0.05); /* Sombra con toque verde */
            width: 100%;
            max-width: 420px;    /* Ancho máximo para que no se estire demasiado en PC */
            border: 1px solid rgba(0, 255, 100, 0.1);
            box-sizing: border-box; /* Crucial para que el padding no agrande el ancho */
        }
        .tarjeta-card h2 { margin-bottom: 5px; color: #ffffff; font-size: 24px; font-weight: 700; text-align: center;}
        .tarjeta-sub { color: #aaaaaa; font-size: 15px; margin-bottom: 30px; text-align: center;}
        
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 18px;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 6px;
        }
        
        /* Estilo unificado de inputs en gris oscuro */
        .input-bento-oscuro, .input-readonly {
            padding: 12px 14px;
            background-color: #2a2a2a; /* El gris oscuro que querías */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 15px;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
            box-sizing: border-box; /* Crucial para que no sobresalga */
        }
        .input-bento-oscuro::placeholder { color: rgba(255, 255, 255, 0.4); }
        .input-bento-oscuro:focus { 
            border-color: #00ff64; /* Verde neón al hacer foco */
            box-shadow: 0 0 10px rgba(0, 255, 100, 0.15);
        }
        .input-readonly { 
            background-color: #1e1e1e; 
            color: rgba(255, 255, 255, 0.5); 
            font-weight: 700; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
        }
        
        /* Corrección de layout para CVV contenida */
        .form-row { display: flex; gap: 15px; width: 100%;}
        .flex-1 { flex: 1; min-width: 0; }
        
        .titular-capitalizado { text-transform: uppercase; }

        /* BOTÓN VERDE NEÓN ESTILO SPORTIFY */
        .btn-confirmar-pago-sportify {
            background-color: #00ff64; /* Verde neón real */
            color: #121212; /* Texto en negro para contraste */
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 255, 100, 0.2);
        }
        .btn-confirmar-pago-sportify:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 100, 0.3);
        }
        .btn-confirmar-pago-sportify:active { transform: translateY(1px); }

        .btn-cancelar {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-weight: 500;
        }
        .btn-cancelar:hover { color: #00ff64; text-decoration: underline; }
    </style>
</head>
<body>

<div class="tarjeta-container">
    <div class="tarjeta-card">
        <h2>💳 Pago con Tarjeta</h2>
        <p class="tarjeta-sub">Ingresá los datos para simular la transacción</p>
        
        <form method="POST" action="{% url 'pago_tarjeta' %}">
            {% csrf_token %}
            <input type="hidden" name="tipo" value="{{ request.GET.tipo }}">
            <input type="hidden" name="item_id" value="{{ request.GET.item_id }}">
            <input type="hidden" name="monto" value="{{ request.GET.monto }}">

            <div class="form-group">
                <label>Monto a Abonar</label>
                <input type="text" value="${{ request.GET.monto }}" disabled class="input-readonly">
            </div>

            <div class="form-group">
                <label>Número de Tarjeta</label>
                <input type="text" name="nro_tarjeta" placeholder="4517 8492 0192 4829" maxlength="19" required class="input-bento-oscuro">
            </div>

            <div class="form-row">
                <div class="form-group flex-1">
                    <label>Vencimiento</label>
                    <input type="text" name="vence" placeholder="MM/AA" maxlength="5" required class="input-bento-oscuro">
                </div>
                <div class="form-group flex-1">
                    <label>Código (CVV)</label>
                    <input type="password" name="cvv" placeholder="123" maxlength="3" required class="input-bento-oscuro">
                </div>
            </div>

            <div class="form-group">
                <label>Nombre del Titular</label>
                <input type="text" name="titular" placeholder="JUAN PEREZ" required class="input-bento-oscuro titular-capitalizado">
            </div>

            <button type="submit" class="btn-confirmar-pago-sportify">Confirmar Pago Simulado</button>
        </form>

        <a href="{% url 'grilla_actividades' %}" class="btn-cancelar">Cancelar y volver</a>
    </div>
</div>

</body>
</html>
