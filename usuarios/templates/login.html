{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportify - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="overlay"></div>
    <div class="login-container">
        
        <img src="{% static 'img/logo_Sportify.png' %}" class="logo">

        <p class="subtitulo">Iniciar sesión</p>

        <form method="POST">
            {% csrf_token %} <div class="input-group">
                <label>DNI</label>
                <input type="text" name="dni" placeholder="Ingrese su DNI" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <div class="password-container">
                    <input type="password" name="password" placeholder="Ingrese su contraseña" id="login-password" required>
                    <span class="toggle-password" onclick="toggleLoginPassword()">👁</span>
                </div>
            </div>

            <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>

            <button type="submit">INICIAR SESIÓN</button>
        </form>

        <div class="registro-texto">
            ¿No tienes una cuenta?
            <a href="{% url 'register' %}">Regístrate</a>
        </div>
    </div>

    <script>
        function toggleLoginPassword(){
            const passwordInput = document.getElementById("login-password");
            if(passwordInput.type === "password"){
                passwordInput.type = "text";
            }else{
                passwordInput.type = "password";
            }
        }
    </script>
</body>
</html>
