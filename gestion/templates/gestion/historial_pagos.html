{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportify - Mi Historial de Pagos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Base e Interfaz estilo macOS Dark - Sportify */
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        
        /* Contenedor principal imitando los paneles de la grilla */
        .card-custom { 
            background-color: #1c1c1e; 
            border: 1px solid #2c2c2e; 
            border-radius: 12px;
        }

        /* 🟢 HISTORIAL DE PAGOS EN VERDE */
        .text-warning-custom {
            color: #34c759 !important;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Alertas usando el gris intermedio del sistema */
        .alert-custom {
            background-color: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #aeaeae;
        }

        /* 🟢 BOTÓN ÓVALO VERDE CON LETRAS NEGRAS */
        .btn-sportify {
            background-color: #34c759;
            color: #000000 !important;
            border: none;
            font-weight: 600;
            border-radius: 50px;
            padding: 8px 20px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-sportify:hover {
            background-color: #28a745;
            color: #000000 !important;
            transform: scale(1.02);
        }

        /* 🏷️ ESTILO REFORMULADO PARA TU LOGO REAL */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 35px;
            margin-bottom: 20px;
        }

        .logo-img {
            max-width: 160px;
            height: auto;
            opacity: 0.85;
            margin-bottom: 8px;
        }

        .logo-slogan {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            color: #ffffff !important; /* Blanco puro como pediste */
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="card card-custom text-white shadow-lg p-4">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3" style="border-color: #2c2c2e !important;">
            <div>
                <h2 class="h3 text-uppercase text-warning-custom m-0">Historial de Pagos</h2>
                <small class="text-white-50">Control de tus transacciones en Sportify</small>
            </div>
            <a href="/" class="btn btn-sportify btn-sm">Volver al Inicio</a>
        </div>

        {% if not pagos %}
            <div class="alert alert-custom text-center py-5 my-3" role="alert">
                <h4 class="text-white mb-2" style="font-weight: 500;">Sin movimientos</h4>
                <p class="m-0 text-white-50">No has realizado ningún pago en el sistema hasta el momento.</p>
            </div>
        {% else %}
            
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle m-0" style="--bs-table-bg: #1c1c1e;">
                    ... (tu bucle for) ...
                </table>
            </div>
        {% endif %}
        </div> <div class="logo-container">
        <img src="{% static 'img/logo_Sportify.png' %}" alt="Sportify Logo" class="logo-img">
        
    </div>
</div>

</body>
</html>
